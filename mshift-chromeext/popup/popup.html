<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoneyShift Manager</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 헤더 -->
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <div class="logo">
          <img src="../assets/icons/icon32.png" alt="MoneyShift" class="logo-icon">
          <div class="logo-text">
            <h1 class="logo-title">MoneyShift</h1>
            <span class="logo-subtitle">Manager</span>
          </div>
        </div>
      </div>
      <div class="header-right">
        <div class="connection-status" id="connectionStatus">
          <div class="status-indicator" id="statusIndicator"></div>
          <span class="status-text" id="statusText">연결 중...</span>
        </div>
        <button class="settings-btn" id="settingsBtn" title="설정">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"></path>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- 메인 콘텐츠 -->
  <main class="main">
    <!-- 시스템 상태 카드 -->
    <section class="status-section">
      <div class="section-header">
        <h2 class="section-title">시스템 상태</h2>
        <div class="system-health" id="systemHealth">
          <div class="health-indicator"></div>
          <span class="health-text">확인 중...</span>
        </div>
      </div>
      
      <!-- 전체 제어 버튼 -->
      <div class="global-controls">
        <button class="control-btn start-all" id="startAllBtn">
          <div class="btn-icon">⚡</div>
          <div class="btn-content">
            <span class="btn-text">전체 시작</span>
            <span class="btn-subtext">모든 서비스</span>
          </div>
        </button>
        <button class="control-btn stop-all" id="stopAllBtn">
          <div class="btn-icon">🛑</div>
          <div class="btn-content">
            <span class="btn-text">전체 중지</span>
            <span class="btn-subtext">안전 종료</span>
          </div>
        </button>
      </div>
    </section>

    <!-- 서비스 목록 -->
    <section class="services-section">
      <div class="section-header">
        <h2 class="section-title">서비스 관리</h2>
        <button class="refresh-btn" id="refreshBtn" title="새로고침">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path>
          </svg>
        </button>
      </div>
      
      <div class="services-grid" id="servicesGrid">
        <!-- 서비스 카드들이 동적으로 생성됩니다 -->
      </div>
    </section>

    <!-- 빠른 링크 -->
    <section class="links-section">
      <div class="section-header">
        <h2 class="section-title">빠른 접근</h2>
      </div>
      
      <div class="quick-links">
        <a href="http://localhost:3000" target="_blank" class="quick-link" id="adminLink">
          <div class="link-icon">🌐</div>
          <div class="link-content">
            <span class="link-title">Admin Panel</span>
            <span class="link-url">localhost:3000</span>
          </div>
          <div class="link-arrow">→</div>
        </a>
        
        <a href="http://localhost:8080/mshift-api" target="_blank" class="quick-link" id="apiLink">
          <div class="link-icon">☕</div>
          <div class="link-content">
            <span class="link-title">API Server</span>
            <span class="link-url">localhost:8080</span>
          </div>
          <div class="link-arrow">→</div>
        </a>
        
        <a href="http://localhost:19002" target="_blank" class="quick-link" id="mobileLink">
          <div class="link-icon">📱</div>
          <div class="link-content">
            <span class="link-title">Mobile Dev</span>
            <span class="link-url">localhost:19002</span>
          </div>
          <div class="link-arrow">→</div>
        </a>
      </div>
    </section>

    <!-- 최근 로그 -->
    <section class="logs-section" id="logsSection">
      <div class="section-header">
        <h2 class="section-title">최근 로그</h2>
        <button class="view-all-btn" id="viewAllLogsBtn">전체 보기</button>
      </div>
      
      <div class="logs-container" id="logsContainer">
        <div class="logs-empty" id="logsEmpty">
          <div class="empty-icon">📄</div>
          <span class="empty-text">로그가 없습니다</span>
        </div>
      </div>
    </section>
  </main>

  <!-- 푸터 -->
  <footer class="footer">
    <div class="footer-content">
      <span class="footer-text">
        Made with ❤️ for developers
      </span>
      <div class="footer-actions">
        <button class="footer-btn" id="feedbackBtn" title="피드백">💬</button>
        <button class="footer-btn" id="helpBtn" title="도움말">❓</button>
      </div>
    </div>
  </footer>

  <!-- 로딩 오버레이 -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <span class="loading-text">처리 중...</span>
    </div>
  </div>

  <!-- 알림 토스트 -->
  <div class="toast" id="toast">
    <div class="toast-content">
      <div class="toast-icon" id="toastIcon">✅</div>
      <div class="toast-message" id="toastMessage">성공!</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
