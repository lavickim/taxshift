<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#gradient1)"/>
  
  <!-- MoneyShift Logo Design -->
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="45" stroke="url(#gradient2)" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Money symbol ($) -->
  <g transform="translate(64, 64)">
    <!-- Dollar sign -->
    <path d="M-8 -20 Q-8 -24 -4 -24 L4 -24 Q8 -24 8 -20 L8 -12 Q8 -8 4 -8 L-4 -8 Q-8 -8 -8 -4 L-8 4 Q-8 8 -4 8 L4 8 Q8 8 8 12 L8 20 Q8 24 4 24 L-4 24 Q-8 24 -8 20" 
          stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="-30" x2="0" y2="-20" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="0" y2="30" stroke="white" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Shift arrows -->
  <g opacity="0.9">
    <!-- Left arrow -->
    <path d="M20 45 L30 40 L30 50 Z" fill="white"/>
    <line x1="30" y1="45" x2="40" y2="45" stroke="white" stroke-width="2"/>
    
    <!-- Right arrow -->
    <path d="M108 83 L98 78 L98 88 Z" fill="white"/>
    <line x1="98" y1="83" x2="88" y2="83" stroke="white" stroke-width="2"/>
    
    <!-- Up arrow -->
    <path d="M83 20 L78 30 L88 30 Z" fill="white"/>
    <line x1="83" y1="30" x2="83" y2="40" stroke="white" stroke-width="2"/>
    
    <!-- Down arrow -->
    <path d="M45 108 L50 98 L40 98 Z" fill="white"/>
    <line x1="45" y1="98" x2="45" y2="88" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- Data flow dots -->
  <g opacity="0.7">
    <circle cx="32" cy="32" r="2" fill="white">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="96" cy="32" r="2" fill="white">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="96" cy="96" r="2" fill="white">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="32" cy="96" r="2" fill="white">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Inner glow -->
  <circle cx="64" cy="64" r="25" fill="url(#innerGlow)" opacity="0.3"/>
  
  <defs>
    <!-- Main gradient -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- Ring gradient -->
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.6" />
    </linearGradient>
    
    <!-- Inner glow -->
    <radialGradient id="innerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
  </defs>
</svg>