<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyShift Manager 설정</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #2a2a2a;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #404040;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .header-text h1 {
            font-size: 24px;
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-text p {
            margin: 5px 0 0;
            color: #a1a1aa;
            font-size: 14px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section h2 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #333333;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .setting-info {
            flex: 1;
        }

        .setting-info h3 {
            margin: 0 0 5px;
            font-size: 16px;
            color: #ffffff;
        }

        .setting-info p {
            margin: 0;
            font-size: 14px;
            color: #a1a1aa;
        }

        .toggle {
            position: relative;
            width: 50px;
            height: 26px;
            background: #404040;
            border-radius: 13px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle.active {
            background: #667eea;
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle.active::after {
            transform: translateX(24px);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ffffff;
        }

        .input-group input[type="text"],
        .input-group input[type="number"] {
            width: 100%;
            padding: 10px;
            background: #333333;
            border: 1px solid #404040;
            border-radius: 6px;
            color: #ffffff;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .save-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .save-btn:hover {
            transform: translateY(-1px);
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            display: none;
        }

        .status.success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            color: #10b981;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">M$</div>
            <div class="header-text">
                <h1>MoneyShift Manager</h1>
                <p>시스템 제어 설정</p>
            </div>
        </div>

        <div class="section">
            <h2>🚀 서비스 설정</h2>
            
            <div class="setting-item">
                <div class="setting-info">
                    <h3>자동 시작</h3>
                    <p>Chrome 시작 시 MoneyShift 서비스 자동 시작</p>
                </div>
                <div class="toggle" id="autoStart">
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <h3>알림 활성화</h3>
                    <p>서비스 시작/중지 시 알림 표시</p>
                </div>
                <div class="toggle active" id="notifications">
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <h3>상태 모니터링</h3>
                    <p>실시간 서비스 상태 확인</p>
                </div>
                <div class="toggle active" id="monitoring">
                </div>
            </div>
        </div>

        <div class="section">
            <h2>🔗 연결 설정</h2>
            
            <div class="input-group">
                <label>MoneyShift 프로젝트 경로</label>
                <input type="text" id="projectPath" value="/Users/lavickim/_Dev/moneyshift" placeholder="프로젝트 경로를 입력하세요">
            </div>

            <div class="input-group">
                <label>WebSocket 포트</label>
                <input type="number" id="wsPort" value="9999" placeholder="9999">
            </div>
        </div>

        <div class="section">
            <h2>⚡ 단축키 설정</h2>
            
            <div class="setting-item">
                <div class="setting-info">
                    <h3>전체 시작: Cmd+Shift+S</h3>
                    <p>모든 MoneyShift 서비스를 한 번에 시작</p>
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <h3>전체 중지: Cmd+Shift+T</h3>
                    <p>모든 MoneyShift 서비스를 한 번에 중지</p>
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <h3>제어판 열기: Cmd+Shift+M</h3>
                    <p>MoneyShift 제어판 팝업 열기</p>
                </div>
            </div>
        </div>

        <button class="save-btn" onclick="saveSettings()">⚙️ 설정 저장</button>
        <div class="status" id="status"></div>
    </div>

    <script src="options.js"></script>
</body>
</html>
