spring:
  application:
    name: mshift-trojan-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5432/moneyshift_trojan
    username: moneyshift
    password: moneyshift123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  redis:
    host: localhost
    port: 6379
    timeout: 6000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  security:
    jwt:
      secret: trojan-jwt-secret-key-change-in-production
      expiration: 86400000 # 24 hours
  
  # File storage
  file:
    upload-dir: /tmp/trojan-uploads
    allowed-extensions: jpg,jpeg,png,pdf
    max-size: 10485760 # 10MB

server:
  port: 8081
  servlet:
    context-path: /api

# MyBatis Configuration
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.moneyshift.trojan.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    auto-mapping-behavior: partial

# Logging
logging:
  level:
    com.moneyshift.trojan: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/trojan-backend.log

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# OCR Service Configuration
ocr:
  google:
    credentials-path: /path/to/google-cloud-credentials.json
  confidence-threshold: 0.8
  
---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:postgresql://localhost:5432/moneyshift_trojan_test
    username: moneyshift
    password: moneyshift123
  
  redis:
    host: localhost
    port: 6380
  
  file:
    upload-dir: /tmp/trojan-test-uploads

logging:
  level:
    com.moneyshift.trojan: INFO