spring:
  application:
    name: mshift-expense-backend
  
  datasource:
    url: jdbc:postgresql://localhost:5433/trojan_expense_db
    username: trojan_user
    password: trojan_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true
        jdbc:
          lob:
            non_contextual_creation: true
    open-in-view: false
  
  sql:
    init:
      mode: never
  
  redis:
    host: localhost
    port: 6380
    timeout: 6000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  security:
    jwt:
      secret: expense-jwt-secret-key-change-in-production
      expiration: 86400000 # 24 hours
  
  # File storage
  file:
    upload-dir: /tmp/expense-uploads
    allowed-extensions: jpg,jpeg,png,pdf
    max-size: 10485760 # 10MB

server:
  port: 8090
  address: 0.0.0.0

# MyBatis Configuration
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.moneyshift.expense.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    auto-mapping-behavior: partial

# Logging
logging:
  level:
    com.moneyshift.expense: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/expense-backend.log

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# OCR Service Configuration
ocr:
  google:
    credentials-path: /path/to/google-cloud-credentials.json
  confidence-threshold: 0.8
  
---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
  
  datasource:
    url: jdbc:postgresql://localhost:5433/expense_db
    username: expense_user
    password: expense_password
  
  redis:
    host: localhost
    port: 6380
  
  file:
    upload-dir: /tmp/trojan-test-uploads

logging:
  level:
    com.moneyshift.expense: INFO