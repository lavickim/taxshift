server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /mshift-api

spring:
  application:
    name: mshift-api
  
  datasource:
    url: jdbc:postgresql://localhost:5432/moneyshift
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    
  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

mybatis:
  type-aliases-package: com.moneyshift.api.model
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: true
    aggressive-lazy-loading: false

logging:
  level:
    com.moneyshift.api: DEBUG
    org.springframework.web: DEBUG
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
    mappings:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: mshift-api
      service: accounting-engine
    web:
      server:
        request:
          autotime:
            enabled: true
            percentiles: 0.5,0.9,0.95,0.99
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true