<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyShift 퀵 액세스</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: rgba(26, 26, 26, 0.95);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 15px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }

        .logo {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            margin: 0 auto 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.8;
        }

        .content {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .section {
            margin-bottom: 16px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #a0a0a0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .service-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .service-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 8px;
            color: white;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-align: center;
        }

        .service-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .service-btn.running {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .service-btn.starting {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.1);
        }

        .service-btn.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .service-icon {
            font-size: 16px;
        }

        .service-name {
            font-weight: 500;
            font-size: 10px;
        }

        .service-status {
            font-size: 8px;
            opacity: 0.7;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 8px;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .action-btn.danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        .action-btn.danger:hover {
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .shortcuts {
            font-size: 10px;
            color: #666;
            text-align: center;
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .status-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            position: absolute;
            top: 8px;
            right: 8px;
        }

        .status-indicator.running {
            background: #10b981;
        }

        .status-indicator.starting {
            background: #f59e0b;
            animation: pulse 2s infinite;
        }

        .status-indicator.error {
            background: #ef4444;
        }

        .status-indicator.stopped {
            background: #6b7280;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <button class="close-btn" onclick="closeWindow()">✕</button>
    
    <div class="header">
        <div class="logo">M$</div>
        <div class="title">MoneyShift Manager</div>
        <div class="subtitle">빠른 제어</div>
    </div>

    <div class="content">
        <div class="section">
            <div class="section-title">시스템 제어</div>
            <button class="action-btn" onclick="startAllServices()">
                ⚡ 모든 서비스 시작
            </button>
            <button class="action-btn danger" onclick="stopAllServices()">
                🛑 모든 서비스 중지
            </button>
        </div>

        <div class="section">
            <div class="section-title">개별 서비스</div>
            <div class="service-grid" id="serviceGrid">
                <!-- 서비스 버튼들이 동적으로 생성됩니다 -->
            </div>
        </div>

        <div class="shortcuts">
            <div>⌘⇧Q: 퀵 액세스 • ⌘⇧S: 모든 시작 • ⌘⇧T: 모든 중지</div>
        </div>
    </div>

    <script>
        const serviceConfig = {
            backend: { icon: '🔧', name: 'Backend', port: 8080 },
            frontend: { icon: '🎨', name: 'Frontend', port: 3000 },
            database: { icon: '🗄️', name: 'Database', port: 5432 },
            redis: { icon: '🔄', name: 'Redis', port: 6379 },
            mobile: { icon: '📱', name: 'Mobile', port: 19002 }
        }

        let services = {}

        function closeWindow() {
            window.electronAPI.closeQuickAccess()
        }

        async function startAllServices() {
            try {
                await window.electronAPI.startAllServices()
                updateServiceStatus()
            } catch (error) {
                console.error('Failed to start all services:', error)
            }
        }

        async function stopAllServices() {
            try {
                await window.electronAPI.stopAllServices()
                updateServiceStatus()
            } catch (error) {
                console.error('Failed to stop all services:', error)
            }
        }

        async function toggleService(serviceName) {
            try {
                const service = services[serviceName]
                if (service && service.status === 'running') {
                    await window.electronAPI.stopService(serviceName)
                } else {
                    await window.electronAPI.startService(serviceName)
                }
                updateServiceStatus()
            } catch (error) {
                console.error(`Failed to toggle ${serviceName}:`, error)
            }
        }

        function renderServices() {
            const grid = document.getElementById('serviceGrid')
            grid.innerHTML = ''

            Object.entries(serviceConfig).forEach(([key, config]) => {
                const service = services[key] || { status: 'stopped' }
                const button = document.createElement('div')
                button.className = `service-btn ${service.status}`
                button.onclick = () => toggleService(key)
                
                button.innerHTML = `
                    <div class="service-icon">${config.icon}</div>
                    <div class="service-name">${config.name}</div>
                    <div class="service-status">${service.status}</div>
                    <div class="status-indicator ${service.status}"></div>
                `
                
                grid.appendChild(button)
            })
        }

        async function updateServiceStatus() {
            try {
                const status = await window.electronAPI.getServicesStatus()
                services = status
                renderServices()
            } catch (error) {
                console.error('Failed to get service status:', error)
            }
        }

        // 서비스 상태 실시간 업데이트
        window.electronAPI.onServicesStatusUpdate((status) => {
            services = status
            renderServices()
        })

        // 초기 로드
        document.addEventListener('DOMContentLoaded', () => {
            updateServiceStatus()
            
            // 5초마다 상태 업데이트
            setInterval(updateServiceStatus, 5000)
        })

        // ESC 키로 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeWindow()
            }
        })
    </script>
</body>
</html>
