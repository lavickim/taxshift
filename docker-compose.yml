# MoneyShift Development Environment
# PostgreSQL + Redis 통합 관리
services:
  postgres:
    image: postgres:15
    container_name: moneyshift-postgres
    environment:
      POSTGRES_DB: moneyshift
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./scripts/pg_hba.conf:/var/lib/postgresql/data/pg_hba.conf
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moneyshift"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - moneyshift-network
    command: ["postgres", "-c", "hba_file=/var/lib/postgresql/data/pg_hba.conf"]

  redis:
    image: redis:7-alpine
    container_name: moneyshift-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - moneyshift-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
    name: moneyshift_postgres_data
  redis_data:
    driver: local
    name: moneyshift_redis_data
  trojan_postgres_data:
    driver: local
    name: trojan_postgres_data
  trojan_redis_data:
    driver: local
    name: trojan_redis_data

  trojan-postgres:
    image: postgres:15-alpine
    container_name: trojan-expense-db
    environment:
      POSTGRES_DB: trojan_expense_db
      POSTGRES_USER: trojan_user
      POSTGRES_PASSWORD: trojan_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5433:5432"  # 기존 PostgreSQL과 충돌 방지
    volumes:
      - trojan_postgres_data:/var/lib/postgresql/data
      - ./project-design/trojan-horse/prd/database-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - moneyshift-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trojan_user -d trojan_expense_db"]
      interval: 10s
      timeout: 5s
      retries: 3

  trojan-redis:
    image: redis:7-alpine
    container_name: trojan-expense-redis
    ports:
      - "6380:6379"  # 기존 Redis와 충돌 방지
    volumes:
      - trojan_redis_data:/data
    networks:
      - moneyshift-network
    restart: unless-stopped
    command: redis-server --appendonly yes

networks:
  moneyshift-network:
    driver: bridge
    name: moneyshift_network