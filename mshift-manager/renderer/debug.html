<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - MoneyShift Manager</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #ffffff;
            padding: 20px;
        }
        .status {
            background: #2d2d2d;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .test-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .test-btn:hover {
            background: #5a6fd8;
        }
        #output {
            background: #000;
            color: #00ff00;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>MoneyShift Manager - Debug Mode</h1>
    
    <div class="status">
        <h3>Status Check</h3>
        <p>✅ HTML 로드 완료</p>
        <p>✅ CSS 스타일 적용 완료</p>
        <p id="jsStatus">⏳ JavaScript 확인 중...</p>
        <p id="electronStatus">⏳ Electron API 확인 중...</p>
    </div>

    <div class="status">
        <h3>테스트 기능</h3>
        <button class="test-btn" onclick="testBasicJS()">기본 JS 테스트</button>
        <button class="test-btn" onclick="testElectronAPI()">Electron API 테스트</button>
        <button class="test-btn" onclick="testWindowSize()">윈도우 크기 토글</button>
        <button class="test-btn" onclick="testAlwaysOnTop()">Always on Top 토글</button>
        <button class="test-btn" onclick="clearOutput()">출력 지우기</button>
    </div>

    <div class="status">
        <h3>출력 로그</h3>
        <div id="output"></div>
    </div>

    <script>
        function log(message) {
            const output = document.getElementById('output')
            const timestamp = new Date().toLocaleTimeString()
            output.innerHTML += `[${timestamp}] ${message}\n`
            output.scrollTop = output.scrollHeight
        }

        function clearOutput() {
            document.getElementById('output').innerHTML = ''
        }

        function testBasicJS() {
            log('✅ JavaScript 기본 기능 정상 작동')
            log('✅ DOM 조작 가능')
            log('✅ 이벤트 리스너 정상')
        }

        async function testElectronAPI() {
            try {
                if (window.electronAPI) {
                    log('✅ Electron API 접근 가능')
                    
                    // 서비스 상태 테스트
                    const services = await window.electronAPI.getServicesStatus()
                    log(`✅ 서비스 상태 조회 성공: ${Object.keys(services).length}개 서비스`)
                    
                    // 컴팩트 모드 상태 테스트
                    const compactMode = await window.electronAPI.getCompactMode()
                    log(`✅ 컴팩트 모드 상태: ${compactMode ? '컴팩트' : '풀'} 모드`)
                    
                    // Always on Top 상태 테스트
                    const alwaysOnTop = await window.electronAPI.getAlwaysOnTop()
                    log(`✅ Always on Top 상태: ${alwaysOnTop ? 'ON' : 'OFF'}`)
                    
                } else {
                    log('❌ Electron API 접근 불가')
                }
            } catch (error) {
                log(`❌ Electron API 테스트 실패: ${error.message}`)
            }
        }

        async function testWindowSize() {
            try {
                const newMode = await window.electronAPI.toggleWindowSize()
                log(`✅ 윈도우 크기 토글 성공: ${newMode ? '컴팩트' : '풀'} 모드`)
            } catch (error) {
                log(`❌ 윈도우 크기 토글 실패: ${error.message}`)
            }
        }

        async function testAlwaysOnTop() {
            try {
                const newState = await window.electronAPI.toggleAlwaysOnTop()
                log(`✅ Always on Top 토글 성공: ${newState ? 'ON' : 'OFF'}`)
            } catch (error) {
                log(`❌ Always on Top 토글 실패: ${error.message}`)
            }
        }

        // 초기화
        document.addEventListener('DOMContentLoaded', () => {
            log('🚀 Debug 모드 시작')
            
            // JavaScript 상태 업데이트
            document.getElementById('jsStatus').textContent = '✅ JavaScript 정상 작동'
            
            // Electron API 상태 확인
            if (window.electronAPI) {
                document.getElementById('electronStatus').textContent = '✅ Electron API 정상 연결'
                log('✅ Electron API 사용 가능')
            } else {
                document.getElementById('electronStatus').textContent = '❌ Electron API 연결 실패'
                log('❌ Electron API 연결 실패 - preload 스크립트 확인 필요')
            }
            
            log('✅ 페이지 로드 완료')
        })
    </script>
</body>
</html>
